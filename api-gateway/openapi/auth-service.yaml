openapi: 3.0.3
info:
  title: Hire1Percent Auth Service API
  description: |
    OpenAPI specification for the Hire1Percent Authentication Service.
    This contract defines the endpoints that the API Gateway calls for
    token verification, user profile retrieval, and resource access checks.

    **Token Model**: Opaque Access UUIDs (not JWTs). The Auth Service
    maintains an internal mapping from Access UUID → session/user.

    **Security Model**: The Gateway sends the opaque token via POST body
    to `/verify`. The Auth Service validates it against its session store
    (Redis + MongoDB) and returns the user profile with permissions.
  version: 1.0.0
  contact:
    name: Hire1Percent Platform Team

servers:
  - url: http://localhost:5001
    description: Local Development
  - url: https://auth.hire1percent.com
    description: Production

# ─── Paths ──────────────────────────────────────────────────────
paths:
  /api/v1/auth/verify:
    post:
      operationId: verifyToken
      summary: Verify an opaque Access UUID
      description: |
        Validates the provided opaque access token against the session store.
        Returns the authenticated user profile with role, permissions, and
        session metadata if the token is valid.

        **Called by**: API Gateway auth.middleware.js
        **Frequency**: Every authenticated request
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - token
              properties:
                token:
                  type: string
                  format: uuid
                  description: The opaque Access UUID to verify
                  example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
      responses:
        "200":
          description: Token is valid — returns user profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifySuccessResponse"
        "401":
          description: Token is invalid, expired, or revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                expired:
                  summary: Token expired
                  value:
                    success: false
                    error:
                      code: "AUTH_002"
                      message: "Token has expired"
                invalid:
                  summary: Token invalid
                  value:
                    success: false
                    error:
                      code: "AUTH_003"
                      message: "Token is invalid or has been revoked"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/login:
    post:
      operationId: loginUser
      summary: Authenticate a user
      description: |
        Authenticates credentials and returns an opaque Access UUID and
        a Refresh Token. The Access UUID is used for subsequent API calls.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                  example: "user@hire1percent.com"
                password:
                  type: string
                  format: password
                  minLength: 8
                  example: "SecureP@ssw0rd!"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      summary: Refresh an access token
      description: |
        Exchanges a valid Refresh Token for a new Access UUID.
        The old Access UUID is revoked.

        **Important**: Only the refresh endpoint and logout endpoint
        accept Refresh Tokens. All other endpoints require Access UUIDs.
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  description: The refresh token
      responses:
        "200":
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginSuccessResponse"
        "401":
          description: Refresh token is invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/auth/logout:
    post:
      operationId: logoutUser
      summary: Logout and revoke tokens
      description: |
        Revokes the Access UUID and Refresh Token pair.
        Requires an active Access UUID in the Authorization header.
      tags:
        - Authentication
      security:
        - BearerAuth: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Optional refresh token to revoke explicitly
      responses:
        "200":
          description: Logout successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Logout successful"

  /api/v1/auth/resource-access-check:
    post:
      operationId: checkResourceAccess
      summary: Check resource access permissions
      description: |
        Evaluates whether a user has access to a specific resource
        based on platform-level shared rules (not business-level rules).
        Called only for shared platform authorization checks.
      tags:
        - Authorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - resource
                - action
              properties:
                userId:
                  type: string
                  description: The user ID to check
                resource:
                  type: string
                  description: The resource identifier
                  example: "job:12345"
                action:
                  type: string
                  description: The action to check
                  enum: [read, write, delete, admin]
      responses:
        "200":
          description: Access check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      allowed:
                        type: boolean
                      reason:
                        type: string

  /api/v1/auth/health:
    get:
      operationId: authHealthCheck
      summary: Auth Service health check
      tags:
        - Health
      responses:
        "200":
          description: Auth Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "Auth Service is healthy"

# ─── Components ─────────────────────────────────────────────────
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: Opaque Access UUID token

  schemas:
    VerifySuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            user:
              $ref: "#/components/schemas/UserProfile"
            session:
              $ref: "#/components/schemas/SessionMetadata"

    UserProfile:
      type: object
      properties:
        id:
          type: string
          description: MongoDB ObjectId
          example: "665a1b2c3d4e5f6789012345"
        email:
          type: string
          format: email
          example: "recruiter@hire1percent.com"
        role:
          type: string
          enum: [candidate, recruiter, admin, super_admin]
          example: "recruiter"
        permissions:
          type: array
          items:
            type: string
          example: ["JOB_CREATE", "JOBS_READ", "JOB_UPDATE", "JOB_DELETE"]
        profile:
          type: object
          properties:
            firstName:
              type: string
              example: "Priya"
            lastName:
              type: string
              example: "Sharma"
        isActive:
          type: boolean
          example: true
        tokenVersion:
          type: integer
          description: Increments on password change to invalidate older tokens
          example: 3

    SessionMetadata:
      type: object
      properties:
        sessionId:
          type: string
          format: uuid
          example: "sess-a1b2c3d4-e5f6-7890"
        expiresAt:
          type: string
          format: date-time
          example: "2026-06-25T12:00:00Z"
        tokenVersion:
          type: integer
          example: 3
        createdAt:
          type: string
          format: date-time
        lastAccessedAt:
          type: string
          format: date-time

    LoginSuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            accessToken:
              type: string
              format: uuid
              description: Opaque Access UUID
              example: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
            refreshToken:
              type: string
              description: Refresh token
            expiresIn:
              type: integer
              description: Access token TTL in seconds
              example: 900
            user:
              $ref: "#/components/schemas/UserProfile"

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: object
          properties:
            code:
              type: string
              example: "AUTH_001"
            message:
              type: string
              example: "Token expired or invalid"
        requestId:
          type: string
          format: uuid
        correlationId:
          type: string
        timestamp:
          type: string
          format: date-time
