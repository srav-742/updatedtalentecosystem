# ──────────────────────────────────────────────────────────────
# Hire1Percent Platform — Docker Compose (Local Development)
#
# Services:
#   Core:      api-gateway, auth-service
#   Database:  mongodb, redis
#   Dev Tools: mongo-express, redis-commander
#
# Usage:
#   docker compose up -d --build
#   docker compose down -v
#
# ──────────────────────────────────────────────────────────────

services:
  # ─── MongoDB ──────────────────────────────────────────────
  mongodb:
    image: mongo:6.0
    container_name: h1p-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: h1padmin
      MONGO_INITDB_ROOT_PASSWORD: h1pdevpassword
      MONGO_INITDB_DATABASE: hire1percent
    volumes:
      - mongodb_data:/data/db
    networks:
      - h1p-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ───────────────────────────────────────────────
  redis:
    image: redis:7.0-alpine
    container_name: h1p-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - h1p-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Auth Service ────────────────────────────────────────
  auth-service:
    build:
      context: ../../
      dockerfile: auth-service/Dockerfile
    container_name: h1p-auth-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      PORT: 5001
      NODE_ENV: development
      LOG_LEVEL: debug
      MONGO_URI: mongodb://h1padmin:h1pdevpassword@mongodb:27017/hire1percent?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: hire1percent_jwt_secret_key_2026_docker
      JWT_REFRESH_SECRET: hire1percent_jwt_refresh_secret_key_2026_docker
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      CORS_ORIGIN: http://localhost:3000
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: 10000
    volumes:
      - ../../auth-service/keys:/usr/src/app/keys:ro
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - h1p-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: ../../
      dockerfile: api-gateway/Dockerfile
    container_name: h1p-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      NODE_ENV: development
      LOG_LEVEL: debug
      AUTH_SERVICE_URL: http://auth-service:5001
      JOB_SERVICE_URL: http://localhost:5002
      CANDIDATE_SERVICE_URL: http://localhost:5003
      RECRUITER_SERVICE_URL: http://localhost:5004
      ADMIN_SERVICE_URL: http://localhost:5005
      ASSESSMENT_SERVICE_URL: http://localhost:5006
      INTERVIEW_SERVICE_URL: http://localhost:5007
      RESUME_SERVICE_URL: http://localhost:5008
      NOTIFICATION_SERVICE_URL: http://localhost:5009
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX: 100
      GATEWAY_TIMEOUT_MS: 30000
      PROXY_TIMEOUT_MS: 5000
      CIRCUIT_BREAKER_RESET_TIMEOUT_MS: 30000
      CIRCUIT_BREAKER_ERROR_THRESHOLD: 50
      CIRCUIT_BREAKER_VOLUME_THRESHOLD: 5
      AUTH_CACHE_ENABLED: "true"
      AUTH_CACHE_TTL_MS: 2000
      AUTH_SERVICE_CLIENT_RETRIES: 2
      CORS_ORIGIN: http://localhost:3000
      GRACEFUL_SHUTDOWN_TIMEOUT_MS: 10000
    depends_on:
      auth-service:
        condition: service_healthy
    networks:
      - h1p-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/live"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ─── Mongo Express (Dev Tool) ────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: h1p-mongo-express
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: h1padmin
      ME_CONFIG_MONGODB_ADMINPASSWORD: h1pdevpassword
      ME_CONFIG_MONGODB_URL: mongodb://h1padmin:h1pdevpassword@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - h1p-network
    profiles:
      - tools

  # ─── Redis Commander (Dev Tool) ──────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: h1p-redis-commander
    restart: unless-stopped
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - h1p-network
    profiles:
      - tools

# ─── Networks ──────────────────────────────────────────────
networks:
  h1p-network:
    driver: bridge
    name: h1p-network

# ─── Volumes ──────────────────────────────────────────────
volumes:
  mongodb_data:
    name: h1p-mongodb-data
  redis_data:
    name: h1p-redis-data
