{{- range $name, $svc := .Values.services }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ $name }}
    app.kubernetes.io/part-of: hire1percent
spec:
  replicas: {{ $svc.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 25%
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ $name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ $name }}
        app.kubernetes.io/part-of: hire1percent
      annotations:
        sidecar.istio.io/inject: "{{ $.Values.global.serviceMesh.enabled }}"
        prometheus.io/scrape: "true"
        prometheus.io/path: /metrics
        prometheus.io/port: "{{ $svc.port }}"
    spec:
      serviceAccountName: {{ $.Values.global.serviceAccountName }}
      containers:
        - name: {{ $name }}
          image: "{{ $.Values.global.imageRegistry }}/{{ $svc.image }}:{{ $.Chart.AppVersion }}"
          imagePullPolicy: {{ $.Values.global.imagePullPolicy }}
          ports:
            - containerPort: {{ $svc.port }}
          env:
            - name: NODE_ENV
              value: {{ $.Values.global.environment | quote }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ $.Values.global.tracing.otlpEndpoint | quote }}
            - name: MESSAGE_BROKER_PROVIDER
              value: {{ $.Values.messageBroker.provider | quote }}
          envFrom:
            - secretRef:
                name: {{ $name }}-secrets
            - configMapRef:
                name: {{ $name }}-config
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ $svc.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: {{ $svc.port }}
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
{{- end }}
