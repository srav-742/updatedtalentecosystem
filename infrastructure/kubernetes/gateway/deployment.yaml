# ──────────────────────────────────────────────────────────────
# Hire1Percent API Gateway — Kubernetes Deployment & Service
# ──────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: h1p-foundation
  labels:
    app: api-gateway
    tier: infrastructure
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: api-gateway
        tier: infrastructure
        version: v1
    spec:
      containers:
        - name: api-gateway
          image: hire1percent/api-gateway:latest
          ports:
            - containerPort: 4000
              name: http
          env:
            - name: PORT
              value: "4000"
            - name: NODE_ENV
              value: "production"
            - name: LOG_LEVEL
              value: "info"
            - name: AUTH_SERVICE_URL
              value: "http://auth-service:5001"
            - name: RATE_LIMIT_WINDOW_MS
              value: "60000"
            - name: RATE_LIMIT_MAX
              value: "100"
            - name: AUTH_CACHE_ENABLED
              value: "true"
            - name: AUTH_CACHE_TTL_MS
              value: "2000"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: gateway-config
                  key: CORS_ORIGIN
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /ready
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /live
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
      restartPolicy: Always

---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: h1p-foundation
  labels:
    app: api-gateway
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
  selector:
    app: api-gateway

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config
  namespace: h1p-foundation
data:
  CORS_ORIGIN: "https://hire1percent.com"
