  <!-- Pace.js for automatic progress bar -->
  <script src="https://cdn.jsdelivr.net/npm/pace-js@latest/pace.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pace-js@latest/pace-theme-default.min.css">
  
  <style>
    /* Custom Pace.js theme color to match typical modern apps */
    .pace .pace-progress {
      background: #ffffff;
      height: 3px;
    }
    
    /* Initial Loader that shows instantly before React boots */
    #root:empty, #root:has(.initial-loader) {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #000000;
    }
    .initial-loader {
      width: 48px;
      height: 48px;
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-bottom-color: #ffffff;
      border-radius: 50%;
      display: inline-block;
      box-sizing: border-box;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>

</head>

<body>
  <div id="root">
    <span class="initial-loader"></span>
  </div>

  <script type="module" src="/src/main.jsx"></script>

</body>

</html>
